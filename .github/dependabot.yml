version: 2
updates:
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      commit-message:
          prefix: "chore"
          include: "scope"

    - package-ecosystem: gomod
      directory: "/"
      schedule:
          interval: "weekly"
      commit-message:
          prefix: "chore"
          include: "scope"
      ignore:
          - dependency-name: "lucide-static"
            versions: [">=1.0.0"]
          - dependency-name: "lucide-static"
            update-types: ["version-update:semver-major"]
