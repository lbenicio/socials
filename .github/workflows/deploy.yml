name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    deps:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@v3
              with:
                  hugo-version: "0.163.1"
                  extended: true

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"

            - name: Cache Go modules
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cache/go-build
                      ~/go/pkg/mod
                  key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
                  restore-keys: go-${{ runner.os }}-

            - name: Cache Hugo modules
              uses: actions/cache@v5
              with:
                  path: /tmp/hugo_cache
                  key: hugo-${{ runner.os }}-${{ hashFiles('go.sum') }}
                  restore-keys: hugo-${{ runner.os }}-

            - name: Download Go dependencies
              run: go mod download

            - name: Download Hugo modules
              run: hugo mod get

    build:
        needs: deps
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@v3
              with:
                  hugo-version: "0.163.1"
                  extended: true

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Restore Go cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cache/go-build
                      ~/go/pkg/mod
                  key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
                  restore-keys: go-${{ runner.os }}-

            - name: Restore Hugo cache
              uses: actions/cache@v5
              with:
                  path: /tmp/hugo_cache
                  key: hugo-${{ runner.os }}-${{ hashFiles('go.sum') }}
                  restore-keys: hugo-${{ runner.os }}-

            - name: Configure Pages
              uses: actions/configure-pages@v5
              id: pages

            - name: Build with Hugo
              env:
                  BASE_URL: ${{ steps.pages.outputs.base_url }}
              run: |
                  cat > /tmp/hugo-dynamic.toml << EOF
                  baseURL = "${BASE_URL}"
                  [params]
                  siteUrl = "${BASE_URL}"
                  EOF

                  echo "::group::Hugo build"
                  echo "  baseURL = ${BASE_URL}"
                  echo "  siteUrl = ${BASE_URL}"
                  hugo --minify --environment production --cleanDestinationDir --config hugo.toml,/tmp/hugo-dynamic.toml --logLevel info
                  echo "::endgroup::"
                  echo "Build complete — $(find public -type f | wc -l) files generated"

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: hugo-public
                  path: ./public
                  retention-days: 1

    obfuscate:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"

            - name: Download build artifact
              uses: actions/download-artifact@v8
              with:
                  name: hugo-public
                  path: ./public

            - name: Obfuscate
              run: |
                  echo "::group::Obfuscation"
                  echo "Files to process: $(find public -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' \) | wc -l)"
                  GOPROXY=direct go run github.com/lbenicio/aboutme-v2-theme/cmd/obfuscate@main -verbose ./public
                  echo "::endgroup::"

            - name: Upload pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: ./public

    deploy:
        needs: obfuscate
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5

    report:
        needs: [deps, build, obfuscate, deploy]
        if: always()
        runs-on: ubuntu-latest
        permissions:
            actions: read
        steps:
            - name: Generate summary
              run: |
                  {
                    echo "## 🚀 Deploy Summary"
                    echo ""
                    echo "| Field | Value |"
                    echo "|-------|-------|"
                    echo "| Workflow | Build and Deploy to GitHub Pages |"
                    echo "| Trigger   | ${{ github.event_name }} |"
                    echo "| Branch    | ${{ github.ref_name }} |"
                    echo "| Commit    | [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |"
                    echo "| Actor     | ${{ github.actor }} |"
                    echo "| Ran at    | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |"
                    echo ""
                    echo "### Jobs"
                    echo ""
                    echo "| Job        | Result   |"
                    echo "|------------|----------|"
                    echo "| deps       | ${{ needs.deps.result }} |"
                    echo "| build      | ${{ needs.build.result }} |"
                    echo "| obfuscate  | ${{ needs.obfuscate.result }} |"
                    echo "| deploy     | ${{ needs.deploy.result }} |"
                    echo ""
                    if [ "${{ needs.deploy.result }}" = "success" ]; then
                      echo "✅ Deployed successfully."
                    elif [ "${{ needs.build.result }}" = "failure" ]; then
                      echo "❌ Build failed — check logs above."
                    elif [ "${{ needs.obfuscate.result }}" = "failure" ]; then
                      echo "❌ Obfuscation failed — check logs above."
                    else
                      echo "⚠️  Pipeline incomplete."
                    fi
                  } >> $GITHUB_STEP_SUMMARY
